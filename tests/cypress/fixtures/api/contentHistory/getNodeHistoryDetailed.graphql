query getNodeHistoryDetailed($path: String!, $withLanguageNodes: Boolean!, $offset: Int!, $limit: Int!) {
    jcr {
        nodeByPath(path: $path) {
            uuid
            history {
                entries(withLanguageNodes: $withLanguageNodes, offset: $offset, limit: $limit) {
                    id
                    date
                    path
                    uuid
                    action
                    propertyName
                    userKey
                    message
                }
            }
        }
    }
}
